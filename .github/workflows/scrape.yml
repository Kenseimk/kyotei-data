name: 競艇データ自動収集

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      force_year:
        description: '強制指定する年（例: 2024）。空白なら自動判断'
        required: false
        default: ''
      force_month:
        description: '強制指定する月（例: 3）。空白なら自動判断'
        required: false
        default: ''

permissions:
  contents: write
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存ライブラリインストール
        run: pip install -r requirements.txt

      - name: スクレイピング実行
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          FORCE_YEAR: ${{ github.event.inputs.force_year }}
          FORCE_MONTH: ${{ github.event.inputs.force_month }}
        run: python scripts/auto_runner.py

      - name: CSVをGitにコミット＆プッシュ
        if: always()
        id: git_push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kyotei_data/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "変更なし。スキップします。"
          else
            TODAY=$(date '+%Y-%m-%d %H:%M')
            git commit -m "🚤 競艇データ自動更新 ${TODAY}"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 次の月を即座に起動
        if: steps.git_push.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REMAINING=$(python -c "
          from pathlib import Path
          from datetime import datetime
          data_dir = Path('kyotei_data')
          now = datetime.now()
          remaining = 0
          y, m = 2023, 1
          while (y, m) <= (now.year, now.month):
              if not (data_dir / f'{y}_{m:02d}_kyotei.csv').exists():
                  remaining += 1
              m += 1
              if m > 12:
                  m, y = 1, y + 1
          print(remaining)
          ")
          echo "残り: ${REMAINING}ヶ月"
          if [ "$REMAINING" -gt "0" ]; then
            echo "次の月を即座に起動..."
            gh workflow run scrape.yml --repo $GITHUB_REPOSITORY
          else
            echo "🎉 全月収集完了！"
          fi
